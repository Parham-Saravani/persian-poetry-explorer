<!DOCTYPE html>
<html lang="fa" dir="rtl"
    class="dark dark:scrollbar-thumb-dark-card dark:scrollbar-track-dark-bg scrollbar-thumb-light-border scrollbar-track-light-bg">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body class="dark:bg-dark-bg ">

    <!-- Header Start -->
    <div class="container max-sm:px-3 pt-5 mx-auto">
        <header class="max-sm:flex-row-reverse flex justify-between items-center">
            <div class="flex">
                <button
                    class="hidden justify-center items-center w-10 h-10 dark:text-dark-text border-2 text-xl rounded-full dark:border-dark-surface border-light-surface cursor-pointer transition-transform duration-300 hover:scale-105 shadow-xs dark-btn">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button
                    class="flex justify-center items-center w-10 h-10 dark:text-dark-text border-2 text-xl rounded-full dark:border-dark-surface border-light-surface cursor-pointer transition-transform duration-300 hover:scale-105 shadow-xs light-btn">
                    <i class="fa-solid fa-sun"></i>
                </button>
            </div>
            <div>
                <ul class="max-sm:pr-5 flex gap-6">
                    <li class="h-9 border-b-2 border-dark-primary"><a href="index.html"
                            class="dark:text-dark-text text-light-text font-vazir font-medium text-menu transition-transform duration-300">صفحه
                            اصلی</a></li>
                    <li><a href="poets.html"
                            class="dark:text-dark-text text-light-text font-vazir font-medium text-menu transition-transform duration-300">شاعران</a>
                    </li>
                    <li><a href="fall.html"
                            class="dark:text-dark-text text-light-text font-vazir font-medium text-menu transition-transform duration-300">فال
                            حافظ</a></li>
                </ul>
            </div>
            <div class="max-sm:hidden relative">
                <p class=" dark:text-dark-text text-light-text text-2xl font-vazir font-black">Avin</p>
                <span
                    class="-right-3 bottom-2.5 animate-pulse absolute dark:bg-dark-primary bg-light-primary w-1.5 h-1.5 rounded-full"></span>
            </div>
        </header>
    </div>
    <!-- Header End -->

    <!-- Divider -->
    <div
        class="mt-2 relative after:content-[''] after:absolute after:w-full after:h-px dark:after:bg-dark-border after:bg-light-border">
    </div>

    <div class="container max-sm:px-3 mx-auto">
        <main class="mt-10 pb-5">
            <!-- page winthout parameter error -->
            <div class="hidden h-100 w-full justify-center items-center not-found-poet-element">
                <div
                    class="flex flex-col items-center gap-4 py-10 px-20 dark:bg-dark-card bg-light-card border-2 dark:border-dark-border border-light-border rounded-xl">
                    <p class="font-vazir text-xl font-bold dark:text-dark-text text-light-text">شاعر مورد نظر یافت نشد
                    </p>
                    <a href="poets.html"
                        class="font-vazir dark:text-dark-text text-dark-text dark:bg-dark-primary bg-light-primary px-3 py-3 rounded-xl transition-normal duration-300 dark:hover:bg-dark-primary-hover hover:bg-light-primary-hover hover:-translate-y-0.5">رفتن
                        به صفحه شاعرها</a>
                </div>
            </div>

            <!-- Page Skeleton Loader-->
            <div class="skeleton-loader">
                <div
                    class="flex dark:bg-dark-card bg-light-card rounded-xl border-2 dark:border-dark-border border-light-border py-6 max-sm:py-5">
                    <div class="w-full px-7 flex justify-center flex-col items-center ">
                        <div class="max-sm:size-30 dark:bg-slate-700 bg-slate-40 size-50 rounded-full animate-pulse">
                        </div>
                        <div class="mt-5 dark:bg-slate-700 bg-slate-400 w-50 h-10 rounded-xl animate-pulse">
                        </div>
                        <div class="mt-5 dark:bg-slate-700 bg-slate-400 w-full h-20 rounded-xl animate-pulse">

                        </div>
                    </div>
                </div>

                <div
                    class="relative mt-4 px-7 py-6 max-sm:py-5 dark:bg-dark-card bg-light-card rounded-xl border-2 dark:border-dark-border border-light-border">
                    <div
                        class="text-xl font-vazir dark:text-dark-text text-light-text font-bold relative pr-5 before:content-[''] before:absolute before:w-2.5 before:h-2.5 dark:before:bg-dark-primary before:bg-light-primary before:rounded-full before:top-0 before:bottom-0 before:my-auto before:right-0 ">
                        <p class="w-50  h-10 dark:bg-slate-700 bg-slate-400 animate-pulse rounded-xl"></p>
                    </div>
                    <div class="mt-5 w-full h-30 dark:bg-slate-700 bg-slate-400 animate-pulse rounded-xl">
                    </div>

                </div>

                <!-- poet works -->
                <div
                    class="relative mt-4 px-7 py-6 max-sm:py-5 dark:bg-dark-card bg-light-card rounded-xl border-2 dark:border-dark-border border-light-border">
                    <div
                        class="text-xl font-vazir dark:text-dark-text text-light-text font-bold relative pr-5 before:content-[''] before:absolute before:w-2.5 before:h-2.5 dark:before:bg-dark-primary before:bg-light-primary before:rounded-full before:top-0 before:bottom-0 before:my-auto before:right-0 ">
                        <p class="w-50 h-10 dark:bg-slate-700 bg-slate-400 animate-pulse rounded-xl"></p>
                    </div>
                    <div class="mt-5 w-full h-20 dark:bg-slate-700 bg-slate-400 animate-pulse rounded-xl">
                    </div>

                </div>

                <!-- poet poems -->
                <div
                    class="relative mt-4 px-7 py-6 max-sm:py-5 dark:bg-dark-card bg-light-card rounded-xl border-2 dark:border-dark-border border-light-border">
                    <div
                        class="text-xl font-vazir dark:text-dark-text text-light-text font-bold relative pr-5 before:content-[''] before:absolute before:w-2.5 before:h-2.5 dark:before:bg-dark-primary before:bg-light-primary before:rounded-full before:top-0 before:bottom-0 before:my-auto before:right-0 ">
                        <p class="w-50  h-10 dark:bg-slate-700 bg-slate-400 animate-pulse rounded-xl"></p>
                    </div>
                    <div class="mt-5 w-full h-10 dark:bg-slate-700 bg-slate-400 animate-pulse rounded-xl">
                    </div>

                </div>
            </div>

            <!-- Page Content -->
            <div class="poet-Detail hidden">
                <!-- poet image and name and detail -->
                <div
                    class="flex dark:bg-dark-card bg-light-card rounded-xl border-2 dark:border-dark-border border-light-border py-6 max-sm:py-5 transition-normal duration-300">
                    <div class="w-full flex flex-col justify-center items-center">
                        <!-- poet image -->
                        <div
                            class="max-sm:size-30 bg-red-50 size-45 rounded-full shadow-2xl dark:shadow-dark-primary shadow-light-primary">
                            <img class="max-sm:size-30 dark:bg-dark-bg bg-light-bg size-45 rounded-full poet-image border-4 dark:border-dark-primary border-light-primary"
                                alt="">
                        </div>

                        <!-- poet name -->
                        <div class="mt-5">
                            <h1 class="font-vazir font-bold text-4xl dark:text-dark-text text-light-text poet-name">
                            </h1>
                        </div>

                        <div>
                            <p class="short-name"></p>
                        </div>
                        <!-- poet death birth detail-->
                        <div class="mt-10 flex max-sm:gap-3 gap-10">
                            <div
                                class="relative flex flex-col dark:bg-dark-surface bg-light-surface border-2 dark:border-dark-border border-light-border rounded-xl py-5 px-10 h-30 w-65 max-sm:w-25 max-sm:h-30">
                                <i
                                    class="fa-solid fa-location-dot absolute left-4 top-5 max-sm:top-2 max-sm:left-1 text-4xl max-sm:text-2xl dark:text-dark-primary text-light-primary"></i>
                                <div
                                    class="absolute right-10 top-4 max-sm:top-9 max-sm:right-8 flex flex-col items-center">
                                    <p
                                        class="text-[18px] max-sm:text-[14px] font-vazir font-normal dark:text-dark-primary text-light-primary">
                                        زادگاه
                                    </p>
                                    <h1
                                        class="font-vazir text-[17px] max-sm:text-[12px] font-normal dark:text-dark-text text-light-text birth-place">
                                    </h1>
                                    <p
                                        class="mt-1 text-[14px] max-sm:text-[11px] font-vazir font-normal dark:text-dark-text-secondary text-light-text-secondary">
                                        ایران</p>
                                </div>
                            </div>

                            <div
                                class="relative flex flex-col dark:bg-dark-surface bg-light-surface border-2 dark:border-dark-border border-light-border rounded-xl py-5 px-10 h-30 w-65 max-sm:w-25 max-sm:h-30">
                                <i
                                    class="fa-solid fa-seedling absolute left-4 top-5 max-sm:top-2 max-sm:left-1 text-4xl max-sm:text-2xl dark:text-dark-primary text-light-primary"></i>
                                <div
                                    class="absolute right-10 top-4 max-sm:top-9 max-sm:right-5 flex flex-col items-center">
                                    <p
                                        class="text-[18px] max-sm:text-[14px] font-vazir font-normal dark:text-dark-primary text-light-primary">
                                        تولد</p>
                                    <h1
                                        class="font-vazir text-[17px] max-sm:text-[12px] font-normal dark:text-dark-text text-light-text birth-year">
                                    </h1>
                                    <p
                                        class="mt-1 text-[14px] max-sm:text-[11px] font-vazir font-normal dark:text-dark-text-secondary text-light-text-secondary birth-place">
                                    </p>
                                </div>
                            </div>

                            <div
                                class="relative flex flex-col dark:bg-dark-surface bg-light-surface border-2 dark:border-dark-border border-light-border rounded-xl py-5 px-10 h-30 w-65 max-sm:w-25 max-sm:h-30">
                                <i
                                    class="fa-solid fa-feather absolute left-4 top-5 max-sm:top-2 max-sm:left-1 text-4xl max-sm:text-2xl dark:text-dark-primary text-light-primary"></i>
                                <div
                                    class="absolute right-10 top-4 max-sm:top-9 max-sm:right-5 flex flex-col items-center">
                                    <p
                                        class="text-[18px] max-sm:text-[14px] font-vazir font-normal dark:text-dark-primary text-light-primary">
                                        وفات</p>
                                    <h1
                                        class="font-vazir text-[17px] max-sm:text-[12px] font-normal dark:text-dark-text text-light-text death-year">
                                    </h1>
                                    <p
                                        class="mt-1 text-[14px] max-sm:text-[11px] font-vazir font-normal dark:text-dark-text-secondary text-light-text-secondary death-place">
                                    </p>
                                </div>
                            </div>


                        </div>
                    </div>
                </div>

                <!-- poet about-->
                <div
                    class="mt-4 px-7 overflow-hidden py-6 max-sm:py-5 transition-all duration-300 dark:bg-dark-card bg-light-card rounded-xl border-2 dark:border-dark-border border-light-border about-container">
                    <h1
                        class="text-xl font-vazir dark:text-dark-text text-light-text font-bold relative pr-5 before:content-[''] before:absolute before:w-2.5 before:h-2.5 dark:before:bg-dark-primary before:bg-light-primary before:rounded-full before:top-0 before:bottom-0 before:my-auto before:right-0  about-title">
                    </h1>

                    <div
                        class="mt-4 ml-1 mr-auto line-clamp-3 leading-7 about-text font-normal text-justify font-vazir dark:text-dark-text text-light-text">
                    </div>
                    <div class="w-full flex justify-center mt-4">
                        <button
                            class="font-vazir font-medium text-card-description py-2 px-4 dark:hover:border-dark-primary-hover dark:hover:text-dark-primary-hover hover:border-light-primary-hover hover:text-light-primary-hover hover:scale-105 dark:text-dark-primary text-light-primary rounded-xl border-2 dark:border-dark-primary border-light-primary cursor-pointer transition-normal duration-300 show-all-about-text-btn">مشاهده
                            بیشتر</button>
                    </div>
                </div>

                <!-- poet works -->
                <div
                    class="mt-4 px-7 overflow-hidden py-6 max-sm:py-5 dark:bg-dark-card bg-light-card rounded-xl border-2 dark:border-dark-border border-light-border about-container transition-normal duration-300 works-total-container">
                    <h1
                        class="text-xl font-vazir dark:text-dark-text text-light-text font-bold relative pr-5 before:content-[''] before:absolute before:w-2.5 before:h-2.5 dark:before:bg-dark-primary before:bg-light-primary before:rounded-full before:top-0 before:bottom-0 before:my-auto before:right-0  about-title">
                        آثار شاعر
                    </h1>
                    <div class="swiper m-5">
                        <div class="swiper-wrapper works-container">

                        </div>
                        <div class="swiper-pagination"></div>
                    </div>
                </div>

                <!-- poet poems -->
                <div
                    class="mt-4 px-7 overflow-hidden py-6 max-sm:py-5 transition-all duration-300 dark:bg-dark-card bg-light-card rounded-xl border-2 dark:border-dark-border border-light-border about-container transition-normal duration-300">
                    <h1
                        class="text-xl font-vazir dark:text-dark-text text-light-text font-bold relative pr-5 before:content-[''] before:absolute before:w-2.5 before:h-2.5 dark:before:bg-dark-primary before:bg-light-primary before:rounded-full before:top-0 before:bottom-0 before:my-auto before:right-0  about-title">
                        اشعار منتخب</h1>
                    <div class="mt-5 flex flex-col gap-2 poems-container">


                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="./src/js/poet.js"></script>
</body>

</html>
