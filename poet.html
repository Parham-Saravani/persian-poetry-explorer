<!DOCTYPE html>
<html lang="fa" dir="rtl" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body class="dark:bg-dark-bg bg-light-bg">
    <!-- Loader Element -->
    <div
        class="fixed flex justify-center items-center w-full h-full dark:bg-dark-bg bg-light-bg z-50 top-0 right-0 page-loader">
        <div class="bg-black/30 w-50 py-10 flex gap-5 flex-col justify-center items-center rounded-xl">
            <p class="text-[16px] text-dark-text font-vazir">در حال بارگذاری</p>
            <div class="loader w-4 rounded-full animate-loader aspect-square"></div>
        </div>
    </div>

    <!-- Header Start -->
    <div class="container max-sm:px-3 pt-5 mx-auto">
        <header class="max-sm:flex-row-reverse flex justify-between items-center">
            <div class="flex">
                <button
                    class="hidden justify-center items-center w-10 h-10 dark:text-dark-text border-2 text-xl rounded-full dark:border-dark-surface border-light-surface cursor-pointer transition-transform duration-300 hover:scale-105 shadow-xs dark-btn">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button
                    class="flex justify-center items-center w-10 h-10 dark:text-dark-text border-2 text-xl rounded-full dark:border-dark-surface border-light-surface cursor-pointer transition-transform duration-300 hover:scale-105 shadow-xs light-btn">
                    <i class="fa-solid fa-sun"></i>
                </button>
            </div>
            <div>
                <ul class="max-sm:pr-5 flex gap-6">
                    <li class="h-9 border-b-2 border-dark-primary"><a href="index.html"
                            class="dark:text-dark-text text-light-text font-vazir font-medium text-menu transition-transform duration-300">صفحه
                            اصلی</a></li>
                    <li><a href="poets.html"
                            class="dark:text-dark-text text-light-text font-vazir font-medium text-menu transition-transform duration-300">شاعران</a>
                    </li>
                    <li><a href="fall.html"
                            class="dark:text-dark-text text-light-text font-vazir font-medium text-menu transition-transform duration-300">فال
                            حافظ</a></li>
                </ul>
            </div>
            <div class="max-sm:hidden relative">
                <p class=" dark:text-dark-text text-light-text text-2xl font-vazir font-black">Avin</p>
                <span
                    class="-right-3 bottom-2.5 animate-pulse absolute dark:bg-dark-primary bg-light-primary w-1.5 h-1.5 rounded-full"></span>
            </div>
        </header>
    </div>
    <!-- Header End -->

    <!-- Divider -->
    <div
        class="mt-2 relative after:content-[''] after:absolute after:w-full after:h-px dark:after:bg-dark-border after:bg-light-border">
    </div>

    <div class="container max-sm:px-3 mx-auto">
        <main class="mt-10 ">
            <div class="hidden h-100 w-full justify-center items-center not-found-poet-element">
                <div
                    class="flex flex-col items-center gap-4 py-10 px-20 dark:bg-dark-card bg-light-card border-2 dark:border-dark-border border-light-border rounded-xl">
                    <p class="font-vazir text-xl font-bold dark:text-dark-text text-light-text">شاعر مورد نظر یافت نشد
                    </p>
                    <a href="poets.html"
                        class="font-vazir dark:text-dark-text text-dark-text dark:bg-dark-primary bg-light-primary px-3 py-3 rounded-xl transition-normal duration-300 dark:hover:bg-dark-primary-hover hover:bg-light-primary-hover">رفتن
                        به صفحه شاعرها</a>
                </div>
            </div>

            <div class="hidden poet-Detail">
                <div class="flex">
                    <div
                        class="w-full px-7 flex gap-10 items-center dark:bg-dark-card bg-light-card rounded-xl border-2 dark:border-dark-border border-light-border py-6">
                        <div>
                            <img class="shadow-2xl dark:shadow-dark-primary size-50 border-4 rounded-full dark:border-dark-primary border-light-primary poet-image"
                                alt="">
                        </div>
                        <div>
                            <h1
                                class="mt-4 font-vazir font-bold text-4xl dark:text-dark-text text-light-text poet-name">
                            </h1>
                            <div class="mt-4 flex gap-6">
                                <span
                                    class="flex items-center gap-1 font-vazir font-normal dark:text-dark-text text-light-text">
                                    <i
                                        class="fa-solid fa-location-dot text-xl dark:text-dark-primary text-light-primary"></i>
                                    <p class="poet-place"></p>
                                </span>

                                <span class="dark:bg-dark-primary bg-light-primary rounded-xl w-0.5 h-15 block"></span>

                                <span
                                    class="flex items-center gap-1.5 font-vazir font-normal dark:text-dark-text text-light-text">
                                    <i
                                        class="fa-solid fa-calendar text-xl dark:text-dark-primary text-light-primary"></i>
                                    <p class="font-vazir text-xs poet-year"></p>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <div
                    class="relative mt-4 px-7 py-6 dark:bg-dark-card bg-light-card rounded-xl border-2 dark:border-dark-border border-light-border">
                    <h1
                        class="text-xl font-vazir dark:text-dark-text text-light-text font-bold relative pr-5 before:content-[''] before:absolute before:w-2.5 before:h-2.5 dark:before:bg-dark-primary before:bg-light-primary before:rounded-full before:top-0 before:bottom-0 before:my-auto before:right-0  about-title">
                    </h1>
                    <div
                        class="line-clamp-3 leading-7 mt-4 about-text font-normal text-justify font-vazir dark:text-dark-text text-light-text">
                    </div>
                    <div class="w-full flex justify-center mt-4">
                        <button
                            class="font-vazir font-medium text-card-description py-2 px-4 dark:hover:border-dark-primary-hover dark:hover:text-dark-primary-hover hover:border-light-primary-hover hover:text-light-primary-hover hover:scale-105 dark:text-dark-primary text-light-primary rounded-xl border-2 dark:border-dark-primary border-light-primary cursor-pointer transition-normal duration-300 show-all-about-text-btn">مشاهده
                            بیشتر</button>
                    </div>
                </div>

                <div>

                </div>
            </div>
        </main>
    </div>
    <script type="module" src="./src/js/poet.js"></script>
</body>

</html>
